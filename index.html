<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Финансовый трекер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #1f2937);
            --hint-color: var(--tg-theme-hint-color, #6b7280);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #f8fafc);
            --accent-primary: #6366f1; /* Индиго */
            --accent-secondary: #a855f7; /* Фиолетовый */
            --danger-color: #ef4444; /* Красный для расходов */
            --success-color: #10b981; /* Зеленый для доходов */
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        @media (prefers-color-scheme: dark) {
            :root { --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.2); }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 24px;
            text-align: center;
            margin-bottom: 5px;
            font-weight: 800;
        }

        p.subtitle {
            text-align: center;
            color: var(--hint-color);
            font-size: 14px;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .card {
            background-color: var(--secondary-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(156, 163, 175, 0.1);
        }

        .type-selector {
            display: flex;
            background: rgba(156, 163, 175, 0.1);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 20px;
        }

        .type-btn {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            color: var(--hint-color);
            transition: 0.3s;
        }

        .type-btn.active[data-type="Расход"] {
            background: var(--danger-color);
            color: white;
            box-shadow: 0 2px 10px rgba(239, 68, 68, 0.3);
        }

        .type-btn.active[data-type="Доход"] {
            background: var(--success-color);
            color: white;
            box-shadow: 0 2px 10px rgba(16, 185, 129, 0.3);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--hint-color);
        }

        input[type="number"], input[type="text"], select {
            width: 100%;
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid rgba(156, 163, 175, 0.3);
            border-radius: 12px;
            padding: 12px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-color: var(--accent-primary);
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
            transition: opacity 0.2s;
        }

        .submit-btn:active { opacity: 0.8; }
        .submit-btn:disabled { background: #9ca3af; box-shadow: none; }
    </style>
</head>
<body>

    <h1>Мои Финансы</h1>
    <p class="subtitle">Учет доходов и расходов</p>

    <div class="card">
        <div class="type-selector" id="typeSelector">
            <div class="type-btn active" data-type="Расход">Расход</div>
            <div class="type-btn" data-type="Доход">Доход</div>
        </div>

        <div class="form-group">
            <label>Сумма ($)</label>
            <input type="number" id="amount" placeholder="0.00" min="0" step="0.01" required>
        </div>

        <div class="form-group">
            <label>Категория</label>
            <select id="category">
                <option value="Еда и продукты">Еда и продукты</option>
                <option value="Жилье">Жилье</option>
                <option value="Транспорт">Транспорт</option>
                <option value="Инвестиции">Инвестиции</option>
                <option value="Развлечения">Развлечения</option>
                <option value="Зарплата/Бизнес">Зарплата/Бизнес</option>
                <option value="Другое">Другое</option>
            </select>
        </div>

        <div class="form-group">
            <label>Комментарий (необязательно)</label>
            <input type="text" id="comment" placeholder="Например: Покупка продуктов">
        </div>

        <button class="submit-btn" id="submitBtn" onclick="sendData()">Сохранить запись</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Ссылка теперь в кавычках!
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxVXH-FQVNfG2nNufVcdH3myR2Ej30uN_eDqe2VnmGcATjg5btAb9f1B4Sj9xb0bOl2/exec"; 
        
        let currentType = "Расход";

        // Логика переключения Доход/Расход
        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentType = this.getAttribute('data-type');
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            });
        });

        // Отправка данных в Google Таблицу
        async function sendData() {
            const amount = document.getElementById('amount').value;
            const category = document.getElementById('category').value;
            const comment = document.getElementById('comment').value;
            const btn = document.getElementById('submitBtn');

            if (!amount || amount <= 0) {
                tg.showAlert("Пожалуйста, введите корректную сумму.");
                return;
            }

            // Блокируем кнопку на время отправки
            btn.disabled = true;
            btn.innerText = "Отправка...";

            const payload = {
                type: currentType,
                amount: parseFloat(amount),
                category: category,
                comment: comment
            };

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Это важно для обхода ограничений браузера при работе с Google Scripts
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                // При mode: 'no-cors' ответ будет "opaque", поэтому просто считаем, что всё прошло успешно
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                tg.showAlert("Запись успешно добавлена!");
                
                // Очищаем форму
                document.getElementById('amount').value = '';
                document.getElementById('comment').value = '';
                
            } catch (error) {
                tg.showAlert("Ошибка при отправке: " + error.message);
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
            } finally {
                btn.disabled = false;
                btn.innerText = "Сохранить запись";
            }
        }
    </script>
</body>
</html>
